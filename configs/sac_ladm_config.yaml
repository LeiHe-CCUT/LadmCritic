# Environment
env_id: "highway-v0"
max_episode_steps: 1000

# Training Hyperparameters
seed: 42
batch_size: 256
buffer_size: 1000000
gamma: 0.995                # Discount factor
tau: 0.005                 # Soft update coefficient
lr_actor: 0.0001           # Learning rate for Actor
lr_critic: 0.0001          # Learning rate for LadmCritic
alpha: 0.4                 # Entropy coefficient for SAC
learning_starts: 50000     # Steps before starting training
total_timesteps: 300000   # Total steps for training

# Model Architecture
state_embedding_dim: 256   # Dimension of the scene representation h_final
dse_feature_dim: 16        # Output dim of DSE module (d_s)
dce_feature_dim: 16        # Output dim of DCE module (d_c)
dee_feature_dim: 16        # Output dim of DEE module (d_e)